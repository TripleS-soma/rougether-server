<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  :root {
    --bg: #ffffff; --panel: #f7f8fa; --panel2: #eef1f5; --line: #e1e5eb;
    --text: #1c2129; --muted: #5e6b7e; --accent: #2563eb; --green: #0f9d6b;
    --amber: #b7791f; --red: #d63d4a; --purple: #7c3aed;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", Roboto, sans-serif;
    line-height: 1.7; font-size: 15px;
  }
  .wrap { max-width: 960px; margin: 0 auto; padding: 48px 24px 96px; }
  h1 { font-size: 28px; margin: 0 0 4px; }
  h2 { font-size: 21px; margin: 48px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--line); }
  h3 { font-size: 16px; margin: 28px 0 8px; color: var(--accent); }
  p { color: var(--text); }
  .sub { color: var(--muted); margin-top: 0; }
  code { background: var(--panel2); padding: 2px 6px; border-radius: 5px; font-size: 13px;
    font-family: "SF Mono", ui-monospace, Menlo, monospace; color: #1d4ed8; }
  .tag { display: inline-block; font-size: 12px; padding: 2px 9px; border-radius: 999px; font-weight: 600; }
  .tag.domain { background: rgba(37,99,235,.12); color: var(--accent); }
  .tag.userapi { background: rgba(15,157,107,.12); color: var(--green); }
  .tag.test { background: rgba(124,58,237,.12); color: var(--purple); }
  .tag.risk { background: rgba(214,61,74,.12); color: var(--red); }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 18px 20px; margin: 14px 0; }
  table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 14px; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: top; }
  th { color: var(--muted); font-weight: 600; font-size: 13px; }
  td code { white-space: nowrap; }
  .flow { display: flex; flex-direction: column; gap: 0; margin: 16px 0; }
  .step { display: flex; align-items: stretch; gap: 14px; }
  .step .rail { display: flex; flex-direction: column; align-items: center; }
  .step .dot { width: 13px; height: 13px; border-radius: 50%; background: var(--accent); margin-top: 18px; flex: none; }
  .step .bar { width: 2px; flex: 1; background: var(--line); }
  .step:last-child .bar { display: none; }
  .step .body { padding: 12px 0 20px; }
  .step .body .t { font-weight: 600; }
  .step .body .d { color: var(--muted); font-size: 13.5px; }
  .layer-box { border-radius: 10px; padding: 12px 16px; margin: 8px 0; border: 1px solid var(--line); }
  .layer-box.l-userapi { border-left: 4px solid var(--green); }
  .layer-box.l-domain { border-left: 4px solid var(--accent); }
  .layer-box.l-common { border-left: 4px solid var(--muted); }
  .layer-box.l-db { border-left: 4px solid var(--amber); }
  .layer-box .h { font-weight: 700; }
  .layer-box .m { color: var(--muted); font-size: 13px; }
  .pill { font-size: 12px; color: var(--muted); }
  .note { border-left: 3px solid var(--amber); background: rgba(183,121,31,.07);
    padding: 10px 14px; border-radius: 6px; margin: 12px 0; font-size: 14px; }
  .danger { border-left: 3px solid var(--red); background: rgba(214,61,74,.06);
    padding: 10px 14px; border-radius: 6px; margin: 12px 0; font-size: 14px; }
  .ok { color: var(--green); } .bad { color: var(--red); }
  pre { background: #f4f6f9; border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 16px; overflow-x: auto; font-size: 13px; line-height: 1.6;
    color: #1c2129;
    font-family: "SF Mono", ui-monospace, Menlo, monospace; }
  .muted { color: var(--muted); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 640px){ .grid2 { grid-template-columns: 1fr; } }
  .kpi { font-size: 13px; }
  .kpi b { color: var(--green); }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin: 8px 0 0; font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">

  <!--
    ============================================================
    채우는 법 (이 주석은 산출물에 남기지 말 것)
    - 스타일(<style>)·클래스는 그대로 둔다. 룩앤필 단일 소스.
    - 아래 섹션 골격을 plan 파일 + 실제 코드/diff 기준으로 채운다.
    - 해당 기능에 없는 섹션은 통째로 뺀다(억지로 채우지 않음).
    - 코드 재진술 금지 — "무엇을/왜" 흐름과 의사결정 중심.
    재사용 클래스:
      태그        <span class="tag domain|userapi|test|risk">…</span>
      레이어 박스  <div class="layer-box l-userapi|l-domain|l-common|l-db">…</div>
      요청흐름     .flow > .step(.rail > .dot/.bar + .body > .t/.d)
      강조박스     .note(주의/후속)  .danger(함정/위험)
      카드         .card / .grid2
    ============================================================
  -->

  <h1>{{기능명}} — 구현 walkthrough</h1>
  <p class="sub">{{한 줄 부제}}</p>
  <div class="legend">
    <span><span class="tag domain">domain</span> 엔티티·리포지토리·스키마</span>
    <span><span class="tag userapi">user-api</span> 컨트롤러·서비스·DTO</span>
    <span><span class="tag test">test</span> 검증</span>
    <span><span class="tag risk">위험영역</span> 정합성 주의</span>
  </div>

  <h2>1. 한 줄 요약</h2>
  <div class="card"><!-- 무엇을 만들었나 2~3문장 --></div>

  <h2>2. 어디에 무엇을 뒀나 (모듈 구조)</h2>
  <!-- layer-box 들. 이 기능이 건드린 모듈만. -->

  <h2>3. 요청 하나가 흐르는 경로</h2>
  <!-- 대표 엔드포인트 1개를 골라 .flow 단계로. 인증→컨트롤러→서비스→리포지토리→DB→응답 -->

  <h2>4. 만든 엔드포인트</h2>
  <!-- table: 메서드·경로 / 하는 일 / 상태코드 -->

  <h2>5. 핵심 설계 결정</h2>
  <!-- plan의 "결정값(확정)"을 h3 + 설명으로. 왜 그렇게 정했는지 -->

  <h2>6. 위험영역</h2>
  <!-- plan에 (위험) 표시가 있으면. 트랜잭션·정합성·함정을 .danger/.note로. 없으면 섹션 삭제 -->

  <h2>7. 파일별 역할</h2>
  <!-- table: 파일 / 모듈(tag) / 역할 -->

  <h2>8. 테스트 구성</h2>
  <!-- .grid2 카드들. 각 테스트가 무엇을 검증하는지 + 검증 결과(verifier/reviewer) -->

  <h2>9. 데이터 모델</h2>
  <!-- pre 로 테이블/관계 간단히. 없으면 섹션 삭제 -->

  <h2>10. 아직 안 정한 것 (후속)</h2>
  <!-- plan "미해결" + reviewer 비차단 지적. 없으면 섹션 삭제 -->

  <p class="muted" style="font-size:12px; margin-top:48px; text-align:center">
    Rougether · {{도메인}} · {{기능}} walkthrough
  </p>

</div>
</body>
</html>
