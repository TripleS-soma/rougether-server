spring:
  application:
    name: rougether-batch
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/rougether?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  batch:
    job:
      enabled: false

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

---
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
