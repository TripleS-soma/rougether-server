spring:
  application:
    name: rougether-user-api
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  # 프로필 사진 업로드. 10MB 규칙은 서비스 검증(MEMBER_PROFILE_IMAGE_INVALID)이 담당하므로
  # 컨테이너 한도는 그보다 여유 있게 잡아 400 응답 경로가 항상 서비스를 거치게 한다.
  servlet:
    multipart:
      max-file-size: 12MB
      max-request-size: 12MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:local-dev-only-secret-change-in-prod-hs256-needs-32-bytes-min}
  access-ttl: 30m
  refresh-ttl: 14d

kakao:
  api-base-url: ${KAKAO_API_BASE_URL:https://kapi.kakao.com}
  app-id: ${KAKAO_APP_ID:1501738}

google:
  allowed-client-ids: ${GOOGLE_ALLOWED_CLIENT_IDS:}
  certs-url: ${GOOGLE_CERTS_URL:https://www.googleapis.com/oauth2/v3/certs}

# 비어 있으면 FCM 발송 stub으로 동작
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

# 에셋 S3 (자격증명은 env / IAM 으로 해결). bucket·region 은 admin-api 와 동일 버킷.
asset:
  s3:
    bucket: rougether-assets
    region: ap-northeast-2

# 사용자에게 노출할 게시 승인 집 커버 manifest. S3 house/ 전체 목록과 분리함.
house:
  cover-images:
    items:
      - code: cloud_balloon
        name: 구름 풍선 집
        cover-image-key: house/cloud-balloon/house-unified-cloud-balloon-frame.png
      - code: coral_aquarium
        name: 산호 수족관 집
        cover-image-key: house/coral-aquarium/house-unified-coral-aquarium-frame.png
      - code: mushroom_forest
        name: 버섯 숲 집
        cover-image-key: house/mushroom-forest/house-unified-mushroom-forest-frame.png
      - code: night_observatory
        name: 밤의 천문대 집
        cover-image-key: house/night-observatory/house-unified-night-observatory-frame-v3.png
