spring:
  application:
    name: rougether-user-api
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:local-dev-only-secret-change-in-prod-hs256-needs-32-bytes-min}
  access-ttl: 30m
  refresh-ttl: 14d

kakao:
  api-base-url: ${KAKAO_API_BASE_URL:https://kapi.kakao.com}
  app-id: ${KAKAO_APP_ID:1501738}

google:
  allowed-client-ids: ${GOOGLE_ALLOWED_CLIENT_IDS:}
  certs-url: ${GOOGLE_CERTS_URL:https://www.googleapis.com/oauth2/v3/certs}

# 비어 있으면 FCM 발송 stub으로 동작
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

# 사용자에게 노출할 게시 승인 집 커버 key manifest. S3 house/ 전체 목록과 분리함.
house:
  cover-images:
    keys:
      - house/cloud-balloon/house-unified-cloud-balloon-frame.png
      - house/coral-aquarium/house-unified-coral-aquarium-frame.png
      - house/mushroom-forest/house-unified-mushroom-forest-frame.png
      - house/night-observatory/house-unified-night-observatory-frame-v3.png
