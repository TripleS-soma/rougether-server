name: Docker ECR Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: rougether-dev-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  AWS_ROLE_ARN: arn:aws:iam::478572912668:role/rougether-dev-github-actions-deploy
  ECR_REPOSITORY_PREFIX: rougether-dev
  IMAGE_TAG: dev
  FIREBASE_CREDENTIALS_PARAMETER: /rougether-dev/firebase/credentials-json

jobs:
  test:
    name: Gradle test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Grant Gradle wrapper permission
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

  build:
    name: Build and push ${{ matrix.module }}
    runs-on: ubuntu-latest
    # test 와 병렬 실행(벽시계 -3분). 게이트는 deploy 의 needs: [test, build] 가 유지한다 —
    # 여기서는 :sha 태그만 push 하고, 부트스트랩이 쓰는 :dev 승격은 test 통과 후 deploy 가 수행한다.
    strategy:
      matrix:
        include:
          - module: user-api
            repository: user-api
          - module: admin-api
            repository: admin-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          build-args: |
            APP_MODULE=${{ matrix.module }}
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}/${{ matrix.repository }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.module }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.module }}-amd64

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    # test 와 build 가 모두 성공해야 배포·:dev 승격이 일어난다 (병렬화의 게이트)
    needs: [test, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 부트스트랩(terraform user-data)이 쓰는 :dev 태그를 검증 통과분으로 승격.
      # 재빌드 없이 manifest 만 복사하므로 수 초 내 끝난다.
      - name: Promote tested images to :dev
        shell: bash
        run: |
          set -euo pipefail
          for repo in user-api admin-api; do
            docker buildx imagetools create \
              --tag "${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY_PREFIX}/${repo}:${IMAGE_TAG}" \
              "${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY_PREFIX}/${repo}:${GITHUB_SHA}"
          done

      - name: Discover running EC2 instance
        id: ec2
        shell: bash
        run: |
          set -euo pipefail

          aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=rougether-dev-app" "Name=instance-state-name,Values=running" \
            --output json > instances.json

          instance_id="$(jq -r '[.Reservations[].Instances[]] | sort_by(.LaunchTime) | .[-1].InstanceId // empty' instances.json)"
          public_ip="$(jq -r '[.Reservations[].Instances[]] | sort_by(.LaunchTime) | .[-1].PublicIpAddress // empty' instances.json)"

          if [ -z "$instance_id" ] || [ "$instance_id" = "null" ]; then
            echo "No running rougether-dev-app EC2 instance found" >&2
            exit 1
          fi

          echo "instance_id=$instance_id" >> "$GITHUB_OUTPUT"
          echo "public_ip=$public_ip" >> "$GITHUB_OUTPUT"

      - name: Restart containers through SSM
        shell: bash
        run: |
          set -euo pipefail

          account_id="$(aws sts get-caller-identity --query Account --output text)"
          registry="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          user_image="${registry}/${ECR_REPOSITORY_PREFIX}/user-api:${GITHUB_SHA}"
          admin_image="${registry}/${ECR_REPOSITORY_PREFIX}/admin-api:${GITHUB_SHA}"

          deploy_script="$(
            sed \
              -e "s|__AWS_REGION__|${AWS_REGION}|g" \
              -e "s|__REGISTRY__|${registry}|g" \
              -e "s|__USER_IMAGE__|${user_image}|g" \
              -e "s|__ADMIN_IMAGE__|${admin_image}|g" \
              -e "s|__DEPLOYED_SHA__|${GITHUB_SHA}|g" \
              -e "s|__FIREBASE_PARAMETER_NAME__|${FIREBASE_CREDENTIALS_PARAMETER}|g" \
              .github/scripts/deploy-ec2-with-rollback.sh
          )"
          script="$(printf "bash -se <<'ROUGETHER_DEPLOY_SCRIPT'\n%s\nROUGETHER_DEPLOY_SCRIPT\n" "$deploy_script")"

          params="$(jq -n --arg script "$script" '{commands: [$script]}')"
          command_id="$(
            aws ssm send-command \
              --instance-ids "${{ steps.ec2.outputs.instance_id }}" \
              --document-name AWS-RunShellScript \
              --comment "Deploy rougether images from GitHub Actions ${GITHUB_SHA}" \
              --parameters "$params" \
              --query 'Command.CommandId' \
              --output text
          )"

          status="Pending"
          for i in $(seq 1 120); do
            status="$(
              aws ssm get-command-invocation \
                --command-id "$command_id" \
                --instance-id "${{ steps.ec2.outputs.instance_id }}" \
                --query 'Status' \
                --output text 2>/dev/null || echo Pending
            )"

            case "$status" in
              Success|Failed|Cancelled|TimedOut)
                break
                ;;
            esac

            echo "waiting for SSM deploy command ($i/120): $status"
            sleep 10
          done

          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "${{ steps.ec2.outputs.instance_id }}" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json

          if [ "$status" != "Success" ]; then
            exit 1
          fi

      - name: Verify public health endpoints
        shell: bash
        run: |
          set -euo pipefail

          public_ip="${{ steps.ec2.outputs.public_ip }}"
          curl --retry 18 --retry-all-errors --retry-delay 10 -fsS "http://${public_ip}:8080/api/v1/health"
          curl --retry 18 --retry-all-errors --retry-delay 10 -fsS "http://${public_ip}:8081/admin/health"
