name: Docker ECR Deploy

on:
  push:
    branches:
      - main
      - feat/admin-assets
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  AWS_ROLE_ARN: arn:aws:iam::478572912668:role/rougether-dev-github-actions-deploy
  ECR_REPOSITORY_PREFIX: rougether-dev
  IMAGE_TAG: dev

jobs:
  build:
    name: Build and push ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - module: user-api
            repository: user-api
          - module: admin-api
            repository: admin-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          build-args: |
            APP_MODULE=${{ matrix.module }}
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}/${{ matrix.repository }}:${{ env.IMAGE_TAG }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}/${{ matrix.repository }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.module }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.module }}-amd64

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Discover running EC2 instance
        id: ec2
        shell: bash
        run: |
          set -euo pipefail

          aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=rougether-dev-app" "Name=instance-state-name,Values=running" \
            --output json > instances.json

          instance_id="$(jq -r '[.Reservations[].Instances[]] | sort_by(.LaunchTime) | .[-1].InstanceId // empty' instances.json)"
          public_ip="$(jq -r '[.Reservations[].Instances[]] | sort_by(.LaunchTime) | .[-1].PublicIpAddress // empty' instances.json)"

          if [ -z "$instance_id" ] || [ "$instance_id" = "null" ]; then
            echo "No running rougether-dev-app EC2 instance found" >&2
            exit 1
          fi

          echo "instance_id=$instance_id" >> "$GITHUB_OUTPUT"
          echo "public_ip=$public_ip" >> "$GITHUB_OUTPUT"

      - name: Restart containers through SSM
        shell: bash
        run: |
          set -euo pipefail

          account_id="$(aws sts get-caller-identity --query Account --output text)"
          registry="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          user_image="${registry}/${ECR_REPOSITORY_PREFIX}/user-api:${IMAGE_TAG}"
          admin_image="${registry}/${ECR_REPOSITORY_PREFIX}/admin-api:${IMAGE_TAG}"

          read -r -d '' script <<SCRIPT || true
          set -euo pipefail

          wait_health() {
            local name="\$1"
            local url="\$2"
            for i in \$(seq 1 80); do
              if curl -fsS "\$url"; then
                echo "\$name health check passed"
                return 0
              fi
              echo "waiting for \$name health check (\$i/80)"
              sleep 10
            done
            echo "\$name health check failed" >&2
            return 1
          }

          aws ecr get-login-password --region ${AWS_REGION} | docker login ${registry} --username AWS --password-stdin
          docker pull ${user_image}
          docker pull ${admin_image}

          systemctl restart rougether-user-api
          wait_health user-api http://127.0.0.1:8080/api/v1/health

          systemctl restart rougether-admin-api
          wait_health admin-api http://127.0.0.1:8081/admin/health

          docker ps
          SCRIPT

          params="$(jq -n --arg script "$script" '{commands: [$script]}')"
          command_id="$(
            aws ssm send-command \
              --instance-ids "${{ steps.ec2.outputs.instance_id }}" \
              --document-name AWS-RunShellScript \
              --comment "Deploy rougether images from GitHub Actions ${GITHUB_SHA}" \
              --parameters "$params" \
              --query 'Command.CommandId' \
              --output text
          )"

          status="Pending"
          for i in $(seq 1 120); do
            status="$(
              aws ssm get-command-invocation \
                --command-id "$command_id" \
                --instance-id "${{ steps.ec2.outputs.instance_id }}" \
                --query 'Status' \
                --output text 2>/dev/null || echo Pending
            )"

            case "$status" in
              Success|Failed|Cancelled|TimedOut)
                break
                ;;
            esac

            echo "waiting for SSM deploy command ($i/120): $status"
            sleep 10
          done

          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "${{ steps.ec2.outputs.instance_id }}" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json

          if [ "$status" != "Success" ]; then
            exit 1
          fi

      - name: Verify public health endpoints
        shell: bash
        run: |
          set -euo pipefail

          public_ip="${{ steps.ec2.outputs.public_ip }}"
          curl --retry 18 --retry-all-errors --retry-delay 10 -fsS "http://${public_ip}:8080/api/v1/health"
          curl --retry 18 --retry-all-errors --retry-delay 10 -fsS "http://${public_ip}:8081/admin/health"
