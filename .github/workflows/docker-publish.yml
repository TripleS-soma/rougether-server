name: Docker Publish

on:
  push:
    branches:
      - main
      - feat/admin-assets
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - module: user-api
            image: rougether-user-api
          - module: admin-api
            image: rougether-admin-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: image
        shell: bash
        run: |
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/${{ matrix.image }}"
          tags="${image}:${GITHUB_SHA}"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            tags="${tags},${image}:latest"
          else
            tags="${tags},${image}:dev"
          fi

          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            APP_MODULE=${{ matrix.module }}
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.module }}
          cache-to: type=gha,mode=max,scope=${{ matrix.module }}
