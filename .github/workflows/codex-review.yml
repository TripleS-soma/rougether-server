name: Codex Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
  workflow_dispatch:
    inputs:
      pr:
        description: PR number to review
        required: true

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: codex-review-${{ github.event.pull_request.number || inputs.pr }}
  cancel-in-progress: true

jobs:
  review:
    name: Domain review
    runs-on: [self-hosted, mac-mini]
    timeout-minutes: 35
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.event.pull_request.draft == false
        )
      }}

    steps:
      - name: Resolve PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          INPUT_PR_NUMBER: ${{ inputs.pr }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          pr_number="${EVENT_PR_NUMBER:-${INPUT_PR_NUMBER:-}}"
          if [ -z "$pr_number" ]; then
            echo "PR number is required" >&2
            exit 1
          fi

          pr_json="$(gh api "repos/${REPOSITORY}/pulls/${pr_number}")"
          pr_file="$(mktemp)"
          trap 'rm -f "$pr_file"' EXIT
          printf '%s' "$pr_json" > "$pr_file"

          json_field() {
            python3 - "$pr_file" "$1" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as fp:
              value = json.load(fp)
          for key in sys.argv[2].split("."):
              value = value[key]
          if isinstance(value, bool):
              print(str(value).lower())
          else:
              print(value)
          PY
          }

          head_repo="$(json_field head.repo.full_name)"
          draft="$(json_field draft)"
          skip=false
          skip_reason=""

          if [ "$head_repo" != "$REPOSITORY" ]; then
            skip=true
            skip_reason="fork PR is skipped on the self-hosted runner"
          elif [ "$EVENT_NAME" != "workflow_dispatch" ] && [ "$draft" = "true" ]; then
            skip=true
            skip_reason="draft PR is skipped"
          fi

          {
            echo "number=$pr_number"
            echo "base_ref=$(json_field base.ref)"
            echo "base_sha=$(json_field base.sha)"
            echo "head_sha=$(json_field head.sha)"
            echo "head_repo=$head_repo"
            echo "skip=$skip"
            echo "skip_reason=$skip_reason"
          } >> "$GITHUB_OUTPUT"

          if [ "$skip" = "true" ]; then
            echo "$skip_reason"
          fi

      - name: Checkout trusted base
        if: steps.pr.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.pr.outputs.base_sha }}
          path: trusted
          fetch-depth: 1
          persist-credentials: false

      - name: Mint bot token
        if: steps.pr.outputs.skip != 'true'
        id: bot-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.REVIEWER_APP_ID }}
          private-key: ${{ secrets.REVIEWER_APP_PRIVATE_KEY }}
          owner: TripleS-soma
          repositories: |
            rougether-server
            rougether-spec
          permission-contents: read
          permission-pull-requests: write

      - name: Checkout review subject
        if: steps.pr.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          token: ${{ steps.bot-token.outputs.token }}
          ref: ${{ steps.pr.outputs.head_sha }}
          path: subject
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout spec repo
        if: steps.pr.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          token: ${{ steps.bot-token.outputs.token }}
          repository: TripleS-soma/rougether-spec
          path: rougether-spec
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare review refs
        if: steps.pr.outputs.skip != 'true'
        working-directory: subject
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            "+refs/heads/${{ steps.pr.outputs.base_ref }}:refs/remotes/origin/${{ steps.pr.outputs.base_ref }}"

      - name: Check Codex CLI
        if: steps.pr.outputs.skip != 'true'
        run: |
          set -euo pipefail
          command -v codex >/dev/null
          codex --version

      - name: Run Codex review
        if: steps.pr.outputs.skip != 'true'
        env:
          REVIEW_PR_NUMBER: ${{ steps.pr.outputs.number }}
          REVIEW_BASE_REF: origin/${{ steps.pr.outputs.base_ref }}
          REVIEW_HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          REVIEW_SPEC_DIR: ${{ github.workspace }}/rougether-spec
          REVIEW_OUT: ${{ github.workspace }}/findings.json
        run: |
          set -euo pipefail
          unset OPENAI_API_KEY OPENAI_ADMIN_KEY CODEX_API_KEY CODEX_ACCESS_TOKEN
          python3 -m json.tool trusted/.github/review-bot/findings.schema.json >/dev/null
          python3 trusted/.github/review-bot/run_codex_review.py \
            --subject-dir subject \
            --spec-dir "$REVIEW_SPEC_DIR" \
            --base-ref "$REVIEW_BASE_REF" \
            --head-sha "$REVIEW_HEAD_SHA" \
            --pr-number "$REVIEW_PR_NUMBER" \
            --schema trusted/.github/review-bot/findings.schema.json \
            --prompt trusted/.github/review-bot/review-prompt.md \
            --output "$REVIEW_OUT"

      - name: Post review
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          REVIEW_PR_NUMBER: ${{ steps.pr.outputs.number }}
          REVIEW_HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          REVIEW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          python3 trusted/.github/review-bot/post_review.py \
            --repo "${{ github.repository }}" \
            --pr-number "$REVIEW_PR_NUMBER" \
            --head-sha "$REVIEW_HEAD_SHA" \
            --findings findings.json \
            --run-url "$REVIEW_RUN_URL"
