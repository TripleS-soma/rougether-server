<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rougether Admin · 가구 관리</title>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="app-body">
    <header class="app-header">
        <div class="brand brand-sm">
            <span class="brand-mark">R</span>
            <h1>Rougether <span class="badge">ADMIN</span></h1>
        </div>
        <nav class="app-nav">
            <a th:href="@{/}">에셋 업로드</a>
            <a th:href="@{/assets}">에셋 조회</a>
            <a th:href="@{/item-slots}" class="active">가구 관리</a>
            <a th:href="@{/users}">유저 관리</a>
        </nav>
        <div class="header-right">
            <span class="user-chip"><span th:text="${username}">admin</span> 님</span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn-ghost">로그아웃</button>
            </form>
        </div>
    </header>

    <main class="app-main app-main--wide">
        <div class="upload-card">
            <div class="upload-head">
                <h2>가구 관리</h2>
                <p>positioned 가구의 뽑기 등급과 방에 처음 배치될 기본 슬롯을 관리합니다. 변경 즉시 저장됩니다.</p>
            </div>

            <div class="slot-toolbar">
                <input type="search" id="filter" class="slot-search"
                       placeholder="이름·테마·asset key 검색">
                <label class="filter-toggle" for="animated-only">
                    <input type="checkbox" id="animated-only">
                    <span>움짤만 보기</span>
                </label>
                <span class="slot-count" id="count"></span>
            </div>

            <div class="alert alert-error" id="error" hidden></div>

            <div class="slot-table-wrap">
                <table class="slot-table">
                    <thead>
                    <tr>
                        <th></th>
                        <th>아이템</th>
                        <th>테마</th>
                        <th>뽑기 등급</th>
                        <th>기본 슬롯</th>
                        <th class="slot-status-col"></th>
                    </tr>
                    </thead>
                    <tbody id="rows"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script th:inline="javascript">
        const s3BaseUrl = /*[[${s3BaseUrl}]]*/ '';
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        // RoomSlotType 의 positioned 계열 코드와 동일해야 한다 (midCenter 는 캐릭터 자리라 없음, 프론트 FurnitureSlot 과 일치).
        const SLOTS = [
            ['topLeft', '상단 왼쪽'], ['topCenter', '상단 중앙'], ['topRight', '상단 오른쪽'],
            ['midLeft', '중단 왼쪽'], ['midRight', '중단 오른쪽'],
            ['bottomLeft', '하단 왼쪽'], ['bottomCenter', '하단 중앙'], ['bottomRight', '하단 오른쪽']
        ];
        const RARITIES = ['일반', '희귀', '전설'];

        const tbody = document.getElementById('rows');
        const filterInput = document.getElementById('filter');
        const animatedOnlyInput = document.getElementById('animated-only');
        const countEl = document.getElementById('count');
        const errorBox = document.getElementById('error');
        let items = [];

        init();

        async function init() {
            try {
                const res = await fetch('/admin/items/slots');
                if (!res.ok) {
                    showError('목록 조회 실패 (HTTP ' + res.status + ')');
                    return;
                }
                items = (await res.json()).items;
                render();
            } catch (err) {
                showError('목록 조회 중 오류: ' + err.message);
            }
        }

        function render() {
            const keyword = filterInput.value.trim().toLowerCase();
            const animatedOnly = animatedOnlyInput.checked;
            const visible = items.filter((item) =>
                (!keyword || [item.name, item.themeName, item.assetKey]
                    .join(' ').toLowerCase().includes(keyword)) &&
                (!animatedOnly || item.animated));

            tbody.replaceChildren(...visible.map(buildRow));
            countEl.textContent = visible.length + ' / ' + items.length + '개';
        }

        function buildRow(item) {
            const tr = document.createElement('tr');

            const thumbCell = document.createElement('td');
            const img = document.createElement('img');
            img.className = 'slot-thumb';
            img.loading = 'lazy';
            img.alt = item.name;
            img.src = s3BaseUrl + '/' + item.assetKey;
            thumbCell.appendChild(img);

            const nameCell = document.createElement('td');
            const nameEl = document.createElement('div');
            nameEl.className = 'slot-name';
            nameEl.textContent = item.name;
            if (item.animated) {
                const badge = document.createElement('span');
                badge.className = 'item-badge';
                badge.textContent = '움짤';
                nameEl.appendChild(badge);
            }
            const keyEl = document.createElement('div');
            keyEl.className = 'slot-key';
            keyEl.textContent = item.assetKey;
            nameCell.append(nameEl, keyEl);

            const themeCell = document.createElement('td');
            themeCell.textContent = item.themeName;

            const rarityCell = document.createElement('td');
            const raritySelect = document.createElement('select');
            raritySelect.className = 'slot-select rarity-select';
            if (!item.rarityEditable) {
                raritySelect.add(new Option('— 뽑기 미등록 —', ''));
                raritySelect.disabled = true;
            } else {
                if (item.rarityConflict) {
                    const mixed = new Option('— 혼합 —', '', true, true);
                    mixed.disabled = true;
                    raritySelect.add(mixed);
                } else if (!item.rarity) {
                    const unset = new Option('— 미설정 —', '', true, true);
                    unset.disabled = true;
                    raritySelect.add(unset);
                }
                RARITIES.forEach((rarity) => raritySelect.add(new Option(rarity, rarity)));
                if (item.rarity) raritySelect.value = item.rarity;
            }
            raritySelect.title = item.rarityEditable
                ? '변경하면 이 아이템이 포함된 모든 활성 뽑기 풀에 반영됩니다.'
                : '활성 뽑기 풀에 등록된 아이템만 등급을 변경할 수 있습니다.';
            rarityCell.appendChild(raritySelect);

            const slotCell = document.createElement('td');
            const slotSelect = document.createElement('select');
            slotSelect.className = 'slot-select';
            const none = new Option('— 미지정 —', '');
            slotSelect.add(none);
            SLOTS.forEach(([code, label]) => slotSelect.add(new Option(label + ' (' + code + ')', code)));
            slotSelect.value = item.defaultSlot ?? '';
            slotCell.appendChild(slotSelect);

            const statusCell = document.createElement('td');
            statusCell.className = 'slot-status';

            raritySelect.addEventListener('change', () =>
                saveRarity(item, raritySelect, slotSelect, statusCell));
            slotSelect.addEventListener('change', () =>
                saveSlot(item, slotSelect, raritySelect, statusCell));

            tr.append(thumbCell, nameCell, themeCell, rarityCell, slotCell, statusCell);
            return tr;
        }

        async function saveSlot(item, slotSelect, raritySelect, statusCell) {
            const previous = item.defaultSlot ?? '';
            const next = slotSelect.value;
            setSaving(slotSelect, raritySelect, statusCell);
            try {
                const res = await fetch('/admin/items/' + item.id + '/slot', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', [csrfHeader]: csrfToken },
                    body: JSON.stringify({ slot: next || null })
                });
                if (!res.ok) {
                    throw new Error(await errorMessage(res));
                }
                const updated = await res.json();
                item.defaultSlot = updated.defaultSlot;
                showSaved(statusCell);
            } catch (err) {
                slotSelect.value = previous;
                showSaveFailed(statusCell);
                showError(item.name + ' 저장 실패: ' + err.message);
            } finally {
                slotSelect.disabled = false;
                raritySelect.disabled = !item.rarityEditable;
            }
        }

        async function saveRarity(item, raritySelect, slotSelect, statusCell) {
            const previous = item.rarityConflict ? '' : (item.rarity ?? '');
            const next = raritySelect.value;
            if (!next) return;
            setSaving(slotSelect, raritySelect, statusCell);
            try {
                const res = await fetch('/admin/items/' + item.id + '/rarity', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', [csrfHeader]: csrfToken },
                    body: JSON.stringify({ rarity: next })
                });
                if (!res.ok) {
                    throw new Error(await errorMessage(res));
                }
                const updated = await res.json();
                item.rarity = updated.rarity;
                item.rarityEditable = updated.rarityEditable;
                item.rarityConflict = updated.rarityConflict;
                Array.from(raritySelect.options)
                    .filter((option) => option.value === '')
                    .forEach((option) => option.remove());
                raritySelect.value = updated.rarity ?? '';
                showSaved(statusCell);
            } catch (err) {
                raritySelect.value = previous;
                showSaveFailed(statusCell);
                showError(item.name + ' 등급 저장 실패: ' + err.message);
            } finally {
                slotSelect.disabled = false;
                raritySelect.disabled = !item.rarityEditable;
            }
        }

        function setSaving(slotSelect, raritySelect, statusCell) {
            slotSelect.disabled = true;
            raritySelect.disabled = true;
            statusCell.textContent = '저장 중…';
            statusCell.className = 'slot-status';
        }

        function showSaved(statusCell) {
            statusCell.textContent = '저장됨';
            statusCell.className = 'slot-status ok';
            setTimeout(() => { statusCell.textContent = ''; }, 1500);
        }

        function showSaveFailed(statusCell) {
            statusCell.textContent = '실패';
            statusCell.className = 'slot-status err';
        }

        async function errorMessage(response) {
            try {
                const body = await response.json();
                return body.message || ('HTTP ' + response.status);
            } catch {
                return 'HTTP ' + response.status;
            }
        }

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.hidden = false;
            setTimeout(() => { errorBox.hidden = true; }, 4000);
        }

        filterInput.addEventListener('input', render);
        animatedOnlyInput.addEventListener('change', render);
    </script>
</body>
</html>
