<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rougether Admin · 유저 관리</title>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="app-body">
    <header class="app-header">
        <div class="brand brand-sm">
            <span class="brand-mark">R</span>
            <h1>Rougether <span class="badge">ADMIN</span></h1>
        </div>
        <nav class="app-nav">
            <a th:href="@{/}">에셋 업로드</a>
            <a th:href="@{/assets}">에셋 조회</a>
            <a th:href="@{/item-slots}">가구 관리</a>
            <a th:href="@{/users}" class="active">유저 관리</a>
            <a th:href="@{/banned-words}">금칙어</a>
            <a th:href="@{/bug-reports}">버그 제보</a>
        </nav>
        <div class="header-right">
            <span class="user-chip"><span th:text="${username}">admin</span> 님</span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn-ghost">로그아웃</button>
            </form>
        </div>
    </header>

    <main class="app-main app-main--wide">
        <div class="upload-card">
            <div class="upload-head">
                <h2>유저 관리</h2>
                <p>이메일·닉네임으로 검색하고 재화(코인·다이아)를 지급합니다. 지급은 개발/QA용입니다.</p>
            </div>

            <div class="slot-toolbar">
                <input type="search" id="query" class="slot-search" placeholder="이메일·닉네임 검색 후 Enter">
                <span class="slot-count" id="count"></span>
            </div>

            <div class="alert alert-error" id="error" hidden></div>
            <div class="alert alert-ok" id="notice" hidden></div>

            <table class="slot-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>이메일</th>
                    <th>닉네임</th>
                    <th>가입일</th>
                    <th>코인</th>
                    <th>다이아</th>
                    <th>재화 지급</th>
                    <th>캐릭터 지급</th>
                </tr>
                </thead>
                <tbody id="rows"></tbody>
            </table>

            <div class="slot-toolbar" style="justify-content: flex-end; gap: 8px;">
                <button type="button" class="btn-ghost" id="prev">이전</button>
                <span class="slot-count" id="pageInfo"></span>
                <button type="button" class="btn-ghost" id="next">다음</button>
            </div>
        </div>
    </main>

    <script>
        const PAGE_SIZE = 20;
        const tbody = document.getElementById('rows');
        const queryInput = document.getElementById('query');
        const countEl = document.getElementById('count');
        const pageInfoEl = document.getElementById('pageInfo');
        const errorBox = document.getElementById('error');
        const noticeBox = document.getElementById('notice');
        let page = 0;
        let total = 0;

        loadCharacters().then(load);

        async function load() {
            try {
                const params = new URLSearchParams({ page, size: PAGE_SIZE });
                const query = queryInput.value.trim();
                if (query) params.set('query', query);
                const res = await fetch('/admin/users?' + params);
                if (!res.ok) {
                    showError('목록 조회 실패 (HTTP ' + res.status + ')');
                    return;
                }
                const data = await res.json();
                total = data.total;
                tbody.replaceChildren(...data.items.map(buildRow));
                countEl.textContent = '총 ' + total + '명';
                const lastPage = Math.max(Math.ceil(total / PAGE_SIZE) - 1, 0);
                pageInfoEl.textContent = (page + 1) + ' / ' + (lastPage + 1);
                document.getElementById('prev').disabled = page <= 0;
                document.getElementById('next').disabled = page >= lastPage;
            } catch (err) {
                showError('목록 조회 중 오류: ' + err.message);
            }
        }

        function buildRow(user) {
            const tr = document.createElement('tr');

            const idCell = document.createElement('td');
            idCell.textContent = user.userId;

            const emailCell = document.createElement('td');
            emailCell.textContent = user.email ?? '—';

            const nickCell = document.createElement('td');
            nickCell.textContent = user.nickname ?? '(온보딩 전)';

            const joinedCell = document.createElement('td');
            joinedCell.textContent = user.createdAt ? user.createdAt.substring(0, 10) : '—';

            const coinCell = document.createElement('td');
            coinCell.textContent = user.coinBalance.toLocaleString();
            coinCell.dataset.currency = 'COIN';

            const diaCell = document.createElement('td');
            diaCell.textContent = user.diamondBalance.toLocaleString();
            diaCell.dataset.currency = 'DIAMOND';

            const grantCell = document.createElement('td');
            const select = document.createElement('select');
            select.className = 'slot-select';
            select.add(new Option('코인', 'COIN'));
            select.add(new Option('다이아', 'DIAMOND'));
            const amount = document.createElement('input');
            amount.type = 'number';
            amount.min = '1';
            amount.value = '500';
            amount.className = 'slot-search';
            amount.style.width = '90px';
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'btn-ghost';
            btn.textContent = '지급';
            btn.addEventListener('click', () =>
                grant(user, select.value, Number(amount.value), btn, { COIN: coinCell, DIAMOND: diaCell }));
            grantCell.append(select, amount, btn);
            grantCell.style.display = 'flex';
            grantCell.style.gap = '6px';

            const charCell = document.createElement('td');
            const charSelect = document.createElement('select');
            charSelect.className = 'slot-select';
            characterOptions.forEach(c => charSelect.add(new Option(c.name + ' (' + c.code + ')', c.code)));
            const charBtn = document.createElement('button');
            charBtn.type = 'button';
            charBtn.className = 'btn-ghost';
            charBtn.textContent = '지급';
            charBtn.addEventListener('click', () => grantCharacter(user, charSelect.value, charBtn));
            charCell.append(charSelect, charBtn);
            charCell.style.display = 'flex';
            charCell.style.gap = '6px';

            tr.append(idCell, emailCell, nickCell, joinedCell, coinCell, diaCell, grantCell, charCell);
            return tr;
        }

        let characterOptions = [];
        async function loadCharacters() {
            try {
                const res = await fetch('/admin/characters');
                if (res.ok) { characterOptions = await res.json(); }
            } catch (err) { /* select 가 비면 지급 버튼만 무의미 — 목록 화면은 계속 동작 */ }
        }

        async function grantCharacter(user, characterCode, btn) {
            if (!characterCode) { showError('지급할 캐릭터를 선택하세요.'); return; }
            btn.disabled = true;
            try {
                // grant API 는 curl 겸용이라 CSRF 제외 경로 (인증 세션은 필요)
                const res = await fetch('/admin/users/' + user.userId + '/characters/grant', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ characterCode })
                });
                const result = await res.json();
                if (!res.ok) { throw new Error(result.message || ('HTTP ' + res.status)); }
                if (result.alreadyOwned) {
                    showNotice('#' + user.userId + ' 이미 보유 중: ' + characterCode);
                } else {
                    showNotice('#' + user.userId + ' ' + characterCode + ' 지급 완료'
                        + (result.selected ? ' (첫 캐릭터라 착용까지 완료)' : ''));
                }
            } catch (err) {
                showError('#' + user.userId + ' 캐릭터 지급 실패: ' + err.message);
            } finally {
                btn.disabled = false;
            }
        }

        async function grant(user, currencyType, amount, btn, balanceCells) {
            if (!Number.isInteger(amount) || amount < 1) {
                showError('지급 수량은 1 이상의 정수여야 합니다.');
                return;
            }
            btn.disabled = true;
            try {
                // grant API 는 curl 겸용이라 CSRF 제외 경로 (인증 세션은 필요)
                const res = await fetch('/admin/users/' + user.userId + '/wallets/grant', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ currencyType, amount })
                });
                if (!res.ok) {
                    throw new Error('HTTP ' + res.status);
                }
                const result = await res.json();
                balanceCells[currencyType].textContent = result.balance.toLocaleString();
                showNotice('#' + user.userId + ' ' + (currencyType === 'COIN' ? '코인' : '다이아')
                    + ' ' + amount.toLocaleString() + ' 지급 완료 (잔액 ' + result.balance.toLocaleString() + ')');
            } catch (err) {
                showError('#' + user.userId + ' 지급 실패: ' + err.message);
            } finally {
                btn.disabled = false;
            }
        }

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.hidden = false;
            setTimeout(() => { errorBox.hidden = true; }, 4000);
        }

        function showNotice(msg) {
            noticeBox.textContent = msg;
            noticeBox.hidden = false;
            setTimeout(() => { noticeBox.hidden = true; }, 3000);
        }

        queryInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') { page = 0; load(); }
        });
        document.getElementById('prev').addEventListener('click', () => { page = Math.max(page - 1, 0); load(); });
        document.getElementById('next').addEventListener('click', () => { page += 1; load(); });
    </script>
</body>
</html>
