<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rougether Admin · 금칙어 관리</title>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="app-body">
    <header class="app-header">
        <div class="brand brand-sm">
            <span class="brand-mark">R</span>
            <h1>Rougether <span class="badge">ADMIN</span></h1>
        </div>
        <nav class="app-nav">
            <a th:href="@{/}">에셋 업로드</a>
            <a th:href="@{/assets}">에셋 조회</a>
            <a th:href="@{/item-slots}">가구 관리</a>
            <a th:href="@{/users}">유저 관리</a>
            <a th:href="@{/banned-words}" class="active">금칙어</a>
        </nav>
        <div class="header-right">
            <span class="user-chip"><span th:text="${username}">admin</span> 님</span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn-ghost">로그아웃</button>
            </form>
        </div>
    </header>

    <main class="app-main">
        <div class="upload-card">
            <div class="upload-head">
                <h2>금칙어 관리</h2>
                <p>닉네임·집 이름·방명록·미션 제목에서 차단할 단어입니다. 저장 시 정규화(소문자화·특수문자 제거)되며,
                    user-api 반영은 최대 5분 지연됩니다.</p>
            </div>

            <div class="slot-toolbar">
                <input type="text" id="newWord" class="slot-search" placeholder="추가할 금칙어 입력">
                <button type="button" id="addBtn" class="btn-primary">추가</button>
                <span class="slot-count" id="count"></span>
            </div>

            <div class="alert alert-error" id="error" hidden></div>

            <table class="slot-table">
                <thead>
                <tr>
                    <th>금칙어 (정규화 저장)</th>
                    <th>등록일</th>
                    <th></th>
                </tr>
                </thead>
                <tbody id="rows"></tbody>
            </table>
        </div>
    </main>

    <script th:inline="javascript">
        const csrfToken = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
        const tbody = document.getElementById('rows');
        const countEl = document.getElementById('count');
        const errorBox = document.getElementById('error');
        const newWordInput = document.getElementById('newWord');
        document.getElementById('addBtn').addEventListener('click', addWord);
        newWordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addWord(); });

        load();

        async function load() {
            try {
                const res = await fetch('/admin/banned-words');
                if (!res.ok) {
                    showError('목록 조회 실패 (HTTP ' + res.status + ')');
                    return;
                }
                render((await res.json()).items);
            } catch (err) {
                showError('목록 조회 중 오류: ' + err.message);
            }
        }

        function render(items) {
            tbody.replaceChildren(...items.map(buildRow));
            countEl.textContent = items.length + '개';
        }

        function buildRow(item) {
            const tr = document.createElement('tr');
            const wordCell = document.createElement('td');
            wordCell.textContent = item.word;
            const dateCell = document.createElement('td');
            dateCell.textContent = (item.createdAt ?? '').substring(0, 10);
            const actionCell = document.createElement('td');
            const deleteBtn = document.createElement('button');
            deleteBtn.type = 'button';
            deleteBtn.className = 'btn-ghost';
            deleteBtn.textContent = '삭제';
            deleteBtn.addEventListener('click', () => removeWord(item));
            actionCell.appendChild(deleteBtn);
            tr.append(wordCell, dateCell, actionCell);
            return tr;
        }

        async function addWord() {
            const word = newWordInput.value.trim();
            if (!word) return;
            hideError();
            try {
                const res = await fetch('/admin/banned-words', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', [csrfHeader]: csrfToken },
                    body: JSON.stringify({ word })
                });
                if (!res.ok) {
                    throw new Error(await errorMessage(res));
                }
                newWordInput.value = '';
                await load();
            } catch (err) {
                showError('등록 실패: ' + err.message);
            }
        }

        async function removeWord(item) {
            hideError();
            try {
                const res = await fetch('/admin/banned-words/' + item.id, {
                    method: 'DELETE',
                    headers: { [csrfHeader]: csrfToken }
                });
                if (!res.ok && res.status !== 204) {
                    throw new Error(await errorMessage(res));
                }
                await load();
            } catch (err) {
                showError('삭제 실패: ' + err.message);
            }
        }

        async function errorMessage(response) {
            try {
                const body = await response.json();
                return body.message || ('HTTP ' + response.status);
            } catch {
                return 'HTTP ' + response.status;
            }
        }

        function showError(message) {
            errorBox.textContent = message;
            errorBox.hidden = false;
        }

        function hideError() {
            errorBox.hidden = true;
        }
    </script>
</body>
</html>
