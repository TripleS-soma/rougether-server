spring:
  application:
    name: rougether-admin-api
  datasource:
    url: jdbc:h2:mem:rougether-admin;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info

# 로컬 개발용 어드민 시드 계정 (운영 mysql profile 에서는 비활성).
admin:
  seed:
    enabled: true
    username: admin
    password: admin1234

---
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  # 운영 공유 DB 에서는 user-api 만 migration 을 실행함. admin 은 검증만 수행.
  flyway:
    enabled: false

# 운영에서는 시드 비활성 — 어드민 계정은 별도로 안전하게 생성.
admin:
  seed:
    enabled: false
